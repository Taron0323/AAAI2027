seed: 7
output_dir: outputs/smoke

plandepth:
  num_tasks: 12
  depths: [2, 4, 6]
  stochastic: true
  delayed_deadend: true
  max_steps: 8

zeta:
  mode: type_arg
  schema_out: outputs/smoke/plandepth_schema.json

soft_targets:
  horizon: 4
  rollouts: 4
  prefix_fraction: 1.0

training:
  hidden_dim: 32
  horizon: 4
  lambda_future: 0.3
  mu_consistency: 0.1
  eta_success: 0.05
  steps: 8
  learning_rate: 0.05

inference:
  mode: latent_rerank
  candidates: 4
