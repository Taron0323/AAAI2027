auxiliary_code:
  control_tasks:
    title: "Hewitt and Liang control tasks"
    url: "https://github.com/john-hewitt/control-tasks.git"
    archive_url: "https://api.github.com/repos/john-hewitt/control-tasks/tarball/master"
    local_path: "third_party/auxiliary/control-tasks"
    install_command: "Follow upstream README. This checkout may be archive-managed if git clone is blocked."
    required_markers:
      - "README.md"
      - "control-tasks"
    notes: "Auxiliary control-task code for ELD/probing anti-confound checks."
  verl:
    title: "verl"
    url: "https://github.com/verl-project/verl.git"
    archive_url: "https://github.com/verl-project/verl/archive/refs/heads/main.zip"
    local_path: "third_party/auxiliary/verl"
    install_command: "Follow upstream README; used as an optional large-scale RL/SFT training framework."
    required_markers:
      - "README.md"
      - "pyproject.toml"
    notes: "Optional training framework; no model weights are downloaded."
  openrlhf:
    title: "OpenRLHF"
    url: "https://github.com/OpenRLHF/OpenRLHF.git"
    archive_url: "https://github.com/OpenRLHF/OpenRLHF/archive/refs/heads/main.zip"
    local_path: "third_party/auxiliary/OpenRLHF"
    install_command: "Follow upstream README; used as an optional RLHF/SFT training framework."
    required_markers:
      - "README.md"
      - "pyproject.toml"
    notes: "Optional training framework; no model weights are downloaded."

nested_archive_code:
  verl_recipe:
    title: "verl recipe submodule"
    url: "https://github.com/verl-project/verl-recipe.git"
    commit: "e7f889574b8301cc0f0fc1d57c6d67f31ffeb689"
    archive_url: "https://codeload.github.com/verl-project/verl-recipe/tar.gz/e7f889574b8301cc0f0fc1d57c6d67f31ffeb689"
    local_path: "third_party/auxiliary/verl/recipe"
    install_command: "bash scripts/bootstrap_external_assets.sh nested"
    required_markers:
      - "LICENSE"
      - "pyproject.toml"
      - ".foreact_archive_source"
    notes: "Nested verl submodule pinned by the checked-out verl commit; archive-managed when git clone is unstable."
  reflexion_leetcode_env:
    title: "Reflexion leetcode-hard-gym submodule"
    url: "https://github.com/GammaTauAI/leetcode-hard-gym.git"
    commit: "228163abdc983712bebfd8e26f7e7d360830e648"
    archive_url: "https://codeload.github.com/GammaTauAI/leetcode-hard-gym/tar.gz/228163abdc983712bebfd8e26f7e7d360830e648"
    local_path: "third_party/baselines/reflexion/programming_runs/executors/leetcode_env"
    install_command: "bash scripts/bootstrap_external_assets.sh nested"
    required_markers:
      - "README.md"
      - "pyproject.toml"
      - ".foreact_archive_source"
    notes: "Nested Reflexion submodule pinned by the checked-out Reflexion commit; archive-managed when git clone is unstable."

datasets:
  tau2_bench_data:
    title: "tau2-bench official data"
    env_var: "TAU2_BENCH_ROOT"
    local_path: "third_party/benchmarks/tau2-bench/data/tau2/domains"
    download_command: "Follow tau2-bench upstream dataset instructions, then set TAU2_BENCH_ROOT."
    required_markers:
      - "airline"
      - "retail"
      - "telecom"
    notes: "Do not commit benchmark data."
  appworld_data:
    title: "AppWorld official data"
    env_var: "APPWORLD_ROOT"
    local_path: "datasets/appworld"
    download_command: "Install AppWorld and run its official data download command, then set APPWORLD_ROOT."
    required_markers:
      - "data"
    notes: "Do not mix test data into training generation."
  swe_gym_data:
    title: "SWE-Gym official environments/data"
    env_var: "SWE_GYM_ROOT"
    local_path: "datasets/swe-gym"
    download_command: "Follow SWE-Gym upstream setup for environments and data, then set SWE_GYM_ROOT."
    required_markers: []
    notes: "Large environment assets are local-only."
  swe_bench_verified_data:
    title: "SWE-bench Verified data"
    env_var: "SWE_BENCH_ROOT"
    local_path: "datasets/swe-bench"
    download_command: "Use SWE-bench/Hugging Face official Verified setup, then set SWE_BENCH_ROOT."
    required_markers:
      - "verified"
    notes: "Verified instances must come from official sources."
