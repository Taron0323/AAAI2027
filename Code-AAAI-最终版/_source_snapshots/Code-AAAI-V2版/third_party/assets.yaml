# External assets are managed here instead of being faked in smoke code.
# Code assets may be cloned as git submodules or archive directories.
# Dataset assets are intentionally local-only and ignored by git.

benchmark_code:
  tau2_bench:
    title: "tau2-bench"
    url: "https://github.com/sierra-research/tau2-bench.git"
    archive_url: "https://github.com/sierra-research/tau2-bench/archive/refs/heads/main.zip"
    local_path: "third_party/benchmarks/tau2-bench"
    install_command: "python3 -m pip install -e third_party/benchmarks/tau2-bench"
    required_markers:
      - "README.md"
    notes: "Official tau2 benchmark code. Datasets remain outside git."
  appworld:
    title: "AppWorld"
    url: "https://github.com/StonyBrookNLP/appworld.git"
    archive_url: "https://github.com/StonyBrookNLP/appworld/archive/refs/heads/main.zip"
    local_path: "third_party/benchmarks/appworld"
    install_command: "python3 -m pip install -e third_party/benchmarks/appworld"
    required_markers:
      - "README.md"
    notes: "Official AppWorld harness code. Official data must be downloaded via AppWorld instructions."
  swe_gym:
    title: "SWE-Gym"
    url: "https://github.com/SWE-Gym/SWE-Gym.git"
    archive_url: "https://github.com/SWE-Gym/SWE-Gym/archive/refs/heads/main.zip"
    local_path: "third_party/benchmarks/SWE-Gym"
    install_command: "python3 -m pip install -e third_party/benchmarks/SWE-Gym"
    required_markers:
      - "README.md"
    notes: "Official SWE-Gym code/environment layer."
  swe_bench:
    title: "SWE-bench"
    url: "https://github.com/swe-bench/SWE-bench.git"
    archive_url: "https://github.com/swe-bench/SWE-bench/archive/refs/heads/main.zip"
    local_path: "third_party/benchmarks/SWE-bench"
    install_command: "python3 -m pip install -e third_party/benchmarks/SWE-bench"
    required_markers:
      - "README.md"
    notes: "Official SWE-bench harness used for SWE-bench Verified evaluation."
  mini_swe_agent:
    title: "mini-SWE-agent"
    url: "https://github.com/SWE-agent/mini-swe-agent.git"
    archive_url: "https://github.com/SWE-agent/mini-swe-agent/archive/refs/heads/main.zip"
    local_path: "third_party/benchmarks/mini-swe-agent"
    install_command: "python3 -m pip install -e third_party/benchmarks/mini-swe-agent"
    required_markers:
      - "README.md"
      - "pyproject.toml"
    notes: "Recommended lightweight SWE-bench execution harness."

